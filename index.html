<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Cayo Optimizer v10</title>
    <style>
        :root { --blue: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #000000; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; opacity: 0.6; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #3a3a3c; font-size: 16px; background: var(--card); color: var(--text); box-sizing: border-box; }
        button { width: 100%; background: var(--blue); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; background: #34c759; color: white; }
        .p-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 10px; margin-top: 8px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .row input { width: 65px; margin: 0; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="text-align:center">Perfect Split </h3>
    <h4 style="text-align:center">(by GT SEM)</h4>
    <div class="card">
        <label>Number of Heisters</label>
        <select id="p_count">
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
            <option value="4">4 Players</option>
        </select>
    </div>
    <div class="card">
        <label>Available Loot</label>
        <div class="row"><span>🥇 Gold (50%)</span> <input type="number" id="v_gold" value="0" min="0"></div>
        <div class="row"><span>❄️ Coke (50%)</span> <input type="number" id="v_coke" value="0" min="0"></div>
        <div class="row"><span>🖼️ Painting (50%)</span> <input type="number" id="v_paint" value="0" min="0"></div>
        <div class="row"><span>🌿 Weed (33.3%)</span> <input type="number" id="v_weed" value="0" min="0"></div>
        <div class="row"><span>💵 Cash (25%)</span> <input type="number" id="v_cash" value="0" min="0"></div>
    </div>
    <button onclick="doCalc()">OPTIMIZE LOOT</button>
    <div id="result"></div>
</div>

<script>
function doCalc() {
    var nPlayers = parseInt(document.getElementById('p_count').value);
    function getVal(id) { return Math.max(0, parseInt(document.getElementById(id).value) || 0); }

    var inv = { gold: getVal('v_gold'), coke: getVal('v_coke'), paint: getVal('v_paint'), weed: getVal('v_weed'), cash: getVal('v_cash') };
    var lootItems = [
        {id:'gold', n:"Gold", w:50, v:332000},
        {id:'coke', n:"Cocaine", w:50, v:220000},
        {id:'paint', n:"Painting", w:50, v:189500},
        {id:'weed', n:"Weed", w:33.33, v:147000},
        {id:'cash', n:"Cash", w:25, v:90000}
    ];

    var pockets = [];
    for(var i=0; i<nPlayers; i++) pockets.push({items: [], cap: 100});
    var totalTake = 0;

    // Phase 1: Full items
    for(var t = 0; t < lootItems.length; t++) {
        var loot = lootItems[t];
        while(inv[loot.id] > 0) {
            var foundSpot = false;
            for(var p = 0; p < nPlayers; p++) {
                if(pockets[p].cap >= (loot.w - 0.1)) {
                    pockets[p].items.push(loot.n);
                    pockets[p].cap -= loot.w;
                    totalTake += loot.v;
                    inv[loot.id]--;
                    foundSpot = true;
                    break;
                }
            }
            if(!foundSpot) break;
        }
    }

    // Phase 2: Partial items for remaining space
    for(var p = 0; p < nPlayers; p++) {
        if(pockets[p].cap > 1) { 
            for(var t = 0; t < lootItems.length; t++) {
                var l = lootItems[t];
                if(inv[l.id] > 0) {
                    var ratio = pockets[p].cap / l.w;
                    totalTake += (l.v * ratio);
                    pockets[p].items.push(l.n + " (Partial)");
                    pockets[p].cap = 0;
                    inv[l.id]--;
                    break;
                }
            }
        }
    }

    var res = document.getElementById('result');
    res.style.display = 'block';
    res.style.background = totalTake > 0 ? "#34c759" : "#ff3b30";
    if(totalTake === 0) { res.innerHTML = "No loot selected!"; return; }

    var html = "<b>Total Take: $" + Math.round(totalTake).toLocaleString() + "</b><br>";
    pockets.forEach((p, i) => {
        html += "<div class='p-box'><b>Player " + (i+1) + "</b><br>";
        var c = {}; p.items.forEach(x => c[x] = (c[x] || 0) + 1);
        for(var n in c) html += c[n] + "x " + n + "<br>";
        html += "<small>Space left: " + Math.round(p.cap) + "% (FULL)</small></div>";
    });
    res.innerHTML = html;
}
</script>
</body>
</html>
