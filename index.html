<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Cayo Squad Planner</title>
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; --card-bg: #ffffff; --text: #000000; }
        @media (prefers-color-scheme: dark) { :root { --ios-bg: #000000; --card-bg: #1c1c1e; --text: #ffffff; } }
        body { font-family: -apple-system, sans-serif; background-color: var(--ios-bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #3a3a3c; font-size: 16px; background: var(--card-bg); color: var(--text); box-sizing: border-box; }
        button { width: 100%; background: var(--ios-blue); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: bold; }
        #result { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; background: #34c759; color: white; }
        .player-box { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 10px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.2); }
        .loot-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .loot-row input { width: 70px; margin-bottom: 0; text-align: center; }
        h3 { margin: 5px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">Cayo Squad Planner</h2>
    
    <div class="card">
        <label>Aantal Spelers</label>
        <select id="players">
            <option value="1">1 Speler</option>
            <option value="2">2 Spelers</option>
            <option value="3">3 Spelers</option>
            <option value="4">4 Spelers</option>
        </select>
    </div>

    <div class="card">
        <div class="loot-row"><span>🥇 Gold (50%)</span> <input type="number" id="gold" value="0"></div>
        <div class="loot-row"><span>❄️ Coke (50%)</span> <input type="number" id="coke" value="0"></div>
        <div class="loot-row"><span>🖼️ Paint (50%)</span> <input type="number" id="paint" value="0"></div>
        <div class="loot-row"><span>🌿 Weed (33%)</span> <input type="number" id="weed" value="0"></div>
        <div class="loot-row"><span>💵 Cash (25%)</span> <input type="number" id="cash" value="0"></div>
    </div>

    <button onclick="calculate()">Bereken per Speler</button>

    <div id="result"></div>
</div>

<script>
function calculate() {
    const numPlayers = parseInt(document.getElementById('players').value);
    const lootTypes = [
        { id: 'gold', name: "Goud", val: 332000, weight: 50 },
        { id: 'coke', name: "Cocaine", val: 220000, weight: 50 },
        { id: 'paint', name: "Schilderij", val: 189500, weight: 50 },
        { id: 'weed', name: "Wiet", val: 147000, weight: 33.3 },
        { id: 'cash', name: "Cash", val: 90000, weight: 25 }
    ];

    let inventory = {};
    lootTypes.forEach(l => inventory[l.id] = parseInt(document.getElementById(l.id).value) || 0);

    let playersLoot = Array.from({ length: numPlayers }, () => ({ items: [], cap: 100 }));
    let totalValue = 0;

    // Verdeel de buit over de spelers
    lootTypes.forEach(loot => {
        let available = inventory[loot.id];
        for (let p = 0; p < numPlayers; p++) {
            while (available > 0 && playersLoot[p].cap >= loot.weight) {
                playersLoot[p].items.push(loot.name);
                playersLoot[p].cap -= loot.weight;
                totalValue += loot.val;
                available--;
            }
        }
    });

    const resDiv = document.getElementById('result');
    resDiv.style.display = 'block';
    
    if (totalValue === 0) {
        resDiv.innerHTML = "Geen buit ingevoerd!";
        resDiv.style.background = "#ff3b30";
        return;
    }

    resDiv.style.background = "#34c759";
    let html = `<strong>Totale Winst: $${totalValue.toLocaleString()}</strong><br>`;

    playersLoot.forEach((p, index) => {
        html += `<div class="player-box"><h3>Speler ${index + 1}</h3>`;
        if (p.items.length === 0) {
            html += `Niets (Tas is leeg)`;
        } else {
            // Tel items per speler
            const counts = {};
            p.items.forEach(item => counts[item] = (counts[item] || 0) + 1);
            for (const item in counts) {
                html += `${counts[item]}x ${item}<br>`;
            }
        }
        html += `<small style="opacity:0.8">Tas over: ${Math.round(p.cap)}%</small></div>`;
    });

    resDiv.innerHTML = html;
}
</script>
</body>
</html>
